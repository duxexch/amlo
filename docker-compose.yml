# ═══════════════════════════════════════════════════════
# Ablox — Production Docker Compose
# Uses classitest's Traefik for reverse proxy + SSL
# ablox_app joins classitest_classify-network for Traefik discovery
# DB/Redis stay internal on ablox_network
# ═══════════════════════════════════════════════════════

services:
  # ── Ablox Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablox_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-2}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ablox_admin}:${POSTGRES_PASSWORD:-AbL0x_S3cur3_2026!}@postgres:5432/${POSTGRES_DB:-ablox}
      REDIS_URL: redis://:${REDIS_PASSWORD:-AbL0x_R3d1s_2026!}@redis:6379
      # ── Security secrets (REQUIRED for production) ──
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://mrco.live}
      # ── Admin ──
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # ── SMTP ──
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-info@mrco.live}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Ablox}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-info@mrco.live}
      # ── LiveKit (WebRTC Live Streaming) ──
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-ablox_livekit_key}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-ablox_livekit_secret_2026_secure}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-wss://lk.mrco.live}
      # ── Push Notifications (VAPID) ──
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:info@mrco.live}
      # ── TURN/STUN (Coturn) ──
      TURN_SECRET: ${TURN_SECRET:-AbL0x_TURN_S3cr3t_2026!}
      # ── Payment Gateway (Stripe) ──
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://mrco.live/wallet?status=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://mrco.live/wallet?status=cancelled}
      # ── CDN ──
      CDN_URL: ${CDN_URL:-}
      # ── TWA / Android App ──
      TWA_SHA256_FINGERPRINT: ${TWA_SHA256_FINGERPRINT:-}
      PLAY_SHA256_FINGERPRINT: ${PLAY_SHA256_FINGERPRINT:-}
      TWA_PACKAGE_NAME: ${TWA_PACKAGE_NAME:-live.mrco.twa}
      # ── Apple iOS App ──
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-XXXXXXXXXX}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-app.ablox.ios}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - ablox_logs:/app/logs
    networks:
      - ablox_network
      - traefik_net
    labels:
      # ── Traefik routing (discovered by classitest's Traefik) ──
      - "traefik.enable=true"
      - "traefik.docker.network=classitest_classify-network"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.ablox-http.rule=Host(`${DOMAIN:-mrco.live}`) || Host(`www.${DOMAIN:-mrco.live}`)"
      - "traefik.http.routers.ablox-http.entrypoints=web"
      - "traefik.http.routers.ablox-http.middlewares=ablox-redirect"
      - "traefik.http.middlewares.ablox-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.ablox-redirect.redirectscheme.permanent=true"
      # HTTPS router — main entry
      - "traefik.http.routers.ablox.rule=Host(`${DOMAIN:-mrco.live}`) || Host(`www.${DOMAIN:-mrco.live}`)"
      - "traefik.http.routers.ablox.entrypoints=websecure"
      - "traefik.http.routers.ablox.tls=true"
      - "traefik.http.routers.ablox.tls.certresolver=letsencrypt"
      - "traefik.http.services.ablox.loadbalancer.server.port=3000"
      # WebSocket + forwarded headers
      - "traefik.http.middlewares.ablox-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.ablox.middlewares=ablox-headers"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: ablox_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ablox}
      POSTGRES_USER: ${POSTGRES_USER:-ablox_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AbL0x_S3cur3_2026!}
    # No external port — internal only (avoids conflict with vex-db:5432, classitest-db:5433)
    volumes:
      - ablox_pgdata:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ablox_admin} -d ${POSTGRES_DB:-ablox}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── LiveKit Media Server (WebRTC SFU for live streaming) ──
  livekit:
    image: livekit/livekit-server:latest
    container_name: ablox_livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"   # HTTP API + WebSocket signaling
      - "7881:7881"   # RTC (WebRTC)
      - "7882:7882/udp" # UDP for WebRTC media
      - "50000-50100:50000-50100/udp" # ICE UDP port range
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-ablox_livekit_key}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-ablox_livekit_secret_2026_secure}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7880"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - ablox_network
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=classitest_classify-network"
      # LiveKit WebSocket route
      - "traefik.http.routers.livekit.rule=Host(`lk.${DOMAIN:-mrco.live}`)"
      - "traefik.http.routers.livekit.entrypoints=websecure"
      - "traefik.http.routers.livekit.tls=true"
      - "traefik.http.routers.livekit.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit.loadbalancer.server.port=7880"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Redis Cache & Sessions ──
  redis:
    image: redis:7-alpine
    container_name: ablox_redis
    restart: unless-stopped
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-AbL0x_R3d1s_2026!} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --tcp-backlog 511 --tcp-keepalive 60 --hz 100
    # No external port — internal only (avoids conflict with other Redis instances)
    volumes:
      - ablox_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-AbL0x_R3d1s_2026!}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Coturn TURN/STUN Server (NAT traversal for WebRTC) ──
  coturn:
    image: coturn/coturn:latest
    container_name: ablox_coturn
    restart: unless-stopped
    network_mode: host
    command: >
      /bin/sh -c "turnserver -c /etc/turnserver.conf
      --static-auth-secret=$${TURN_SECRET}
      $${TURN_EXTERNAL_IP:+--external-ip=$${TURN_EXTERNAL_IP}}"
    volumes:
      - ./config/turnserver.conf:/etc/turnserver.conf:ro
    environment:
      TURN_SECRET: ${TURN_SECRET:-AbL0x_TURN_S3cr3t_2026!}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
    healthcheck:
      test: ["CMD-SHELL", "pidof turnserver >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  ablox_network:
    name: ablox_network
    driver: bridge
  traefik_net:
    external: true
    name: classitest_classify-network

volumes:
  ablox_pgdata:
    name: ablox_pgdata
    driver: local
  ablox_redisdata:
    name: ablox_redisdata
    driver: local
  ablox_logs:
    name: ablox_logs
    driver: local
