version: "3.9"

services:
  # ── Aplo Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aplo_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-aplo_admin}:${POSTGRES_PASSWORD:-ApL0_S3cur3_2026!}@pgbouncer:6432/${POSTGRES_DB:-aplo}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ApL0_R3d1s_2026!}@redis:6379
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - app_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: aplo_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aplo}
      POSTGRES_USER: ${POSTGRES_USER:-aplo_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ApL0_S3cur3_2026!}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aplo_admin} -d ${POSTGRES_DB:-aplo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 6G

  # ── PgBouncer (Connection Pooler) ──
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: aplo_pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aplo_admin}:${POSTGRES_PASSWORD:-ApL0_S3cur3_2026!}@postgres:5432/${POSTGRES_DB:-aplo}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis Cache & Sessions ──
  redis:
    image: redis:7-alpine
    container_name: aplo_redis
    restart: unless-stopped
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-ApL0_R3d1s_2026!} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ApL0_R3d1s_2026!}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  app_logs:
    driver: local
