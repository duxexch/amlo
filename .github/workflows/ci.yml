# ═══════════════════════════════════════════════════════════
# Ablox — CI/CD Pipeline
# Runs on every push and PR to main
# check → audit → build → deploy
# ═══════════════════════════════════════════════════════════
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ── Lint & Type Check ──
  check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Security Audit ──
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm audit --production --audit-level=high
        continue-on-error: true

  # ── Build Docker Image ──
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check, audit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Build Docker image
        run: docker build -t ablox:${{ github.sha }} .
      - name: Verify Docker image
        run: docker run --rm ablox:${{ github.sha }} node -e "console.log('Image OK')"

  # ── Deploy (only on push to main) ──
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: |
          echo "🚀 Deploy step — configure with your hosting provider"
          echo "Options: docker-compose up -d, kubectl apply, or SSH deploy"
          # Example: ssh deploy@server 'cd /app && docker-compose pull && docker-compose up -d'
