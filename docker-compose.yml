# ═══════════════════════════════════════════════════════
# Ablox — Production Docker Compose
# 4 services: traefik (reverse proxy) + app + postgres + redis
# Traefik handles SSL automatically via Let's Encrypt
# ═══════════════════════════════════════════════════════

services:
  # ── Traefik Reverse Proxy + SSL ──
  traefik:
    image: traefik:v3.3
    container_name: ablox_traefik
    restart: unless-stopped
    command:
      # ── API / Dashboard ──
      - "--api.dashboard=false"
      - "--log.level=WARN"
      # ── Docker provider ──
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ablox_network"
      # ── Entrypoints ──
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # ── HTTP → HTTPS global redirect ──
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # ── Let's Encrypt ──
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-info@mrco.live}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ablox_letsencrypt:/letsencrypt
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Ablox Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablox_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-2}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ablox_admin}:${POSTGRES_PASSWORD:-AbL0x_S3cur3_2026!}@postgres:5432/${POSTGRES_DB:-ablox}
      REDIS_URL: redis://:${REDIS_PASSWORD:-AbL0x_R3d1s_2026!}@redis:6379
      # ── Security secrets (REQUIRED for production) ──
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://mrco.live}
      # ── Admin ──
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # ── SMTP ──
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-info@mrco.live}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Ablox}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-info@mrco.live}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - ablox_logs:/app/logs
    networks:
      - ablox_network
    labels:
      # ── Traefik routing ──
      - "traefik.enable=true"
      # HTTPS router — main entry
      - "traefik.http.routers.ablox.rule=Host(`${DOMAIN:-mrco.live}`)"
      - "traefik.http.routers.ablox.entrypoints=websecure"
      - "traefik.http.routers.ablox.tls=true"
      - "traefik.http.routers.ablox.tls.certresolver=letsencrypt"
      - "traefik.http.services.ablox.loadbalancer.server.port=3000"
      # WebSocket + headers
      - "traefik.http.middlewares.ablox-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.ablox.middlewares=ablox-headers"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: ablox_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ablox}
      POSTGRES_USER: ${POSTGRES_USER:-ablox_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AbL0x_S3cur3_2026!}
    # No external port — internal only (avoids conflict with vex-db:5432, classitest-db:5433)
    volumes:
      - ablox_pgdata:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ablox_admin} -d ${POSTGRES_DB:-ablox}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis Cache & Sessions ──
  redis:
    image: redis:7-alpine
    container_name: ablox_redis
    restart: unless-stopped
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-AbL0x_R3d1s_2026!} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000 --tcp-backlog 511 --tcp-keepalive 60 --hz 100
    # No external port — internal only (avoids conflict with other Redis instances)
    volumes:
      - ablox_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-AbL0x_R3d1s_2026!}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  ablox_network:
    name: ablox_network
    driver: bridge

volumes:
  ablox_pgdata:
    name: ablox_pgdata
    driver: local
  ablox_redisdata:
    name: ablox_redisdata
    driver: local
  ablox_logs:
    name: ablox_logs
    driver: local
  ablox_letsencrypt:
    name: ablox_letsencrypt
    driver: local
