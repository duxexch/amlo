<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ablox — غير متصل</title>
  <meta name="theme-color" content="#0c0c1d">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: #06060f;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 420px;
    }

    /* Animated WiFi-off icon */
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      position: relative;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.3));
    }

    .pulse {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 2px solid rgba(139, 92, 246, 0.15);
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse:nth-child(2) { animation-delay: 0.5s; border-color: rgba(139, 92, 246, 0.1); }
    .pulse:nth-child(3) { animation-delay: 1s; border-color: rgba(139, 92, 246, 0.05); }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0; }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1rem;
      color: #a1a1aa;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124, 58, 237, 0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 20px;
      height: 20px;
    }

    /* Spinning animation on retry */
    .btn.loading svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #52525b;
      min-height: 1.5em;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <div class="pulse"></div>
      <div class="pulse"></div>
      <div class="pulse"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>أنت غير متصل بالإنترنت</h1>
    <p>تحقق من اتصالك بالإنترنت وحاول مرة أخرى. سنعيد الاتصال تلقائياً عند عودة الشبكة.</p>

    <button class="btn" id="retryBtn" onclick="retryConnection()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      إعادة المحاولة
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    function retryConnection() {
      var btn = document.getElementById('retryBtn');
      var status = document.getElementById('status');
      btn.classList.add('loading');
      status.textContent = 'جارٍ الاتصال...';

      fetch('/api/health', { cache: 'no-store' })
        .then(function(r) {
          if (r.ok) {
            status.textContent = 'تم الاتصال! جارٍ التحويل...';
            status.style.color = '#22c55e';
            setTimeout(function() { window.location.reload(); }, 500);
          } else {
            throw new Error('offline');
          }
        })
        .catch(function() {
          btn.classList.remove('loading');
          status.textContent = 'لا يزال غير متصل. حاول مرة أخرى.';
          status.style.color = '#ef4444';
          setTimeout(function() { status.style.color = '#52525b'; }, 3000);
        });
    }

    // Auto-retry when browser detects online
    window.addEventListener('online', function() {
      retryConnection();
    });
  </script>
</body>
</html>
