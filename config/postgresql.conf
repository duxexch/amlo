# ═══════════════════════════════════════════════════════════
# PostgreSQL 16 — Production Configuration
# Mount as /etc/postgresql/postgresql.conf in Docker
# Or include via: ALTER SYSTEM SET <param> = <value>;
# ═══════════════════════════════════════════════════════════

# ── Connection Settings ──
max_connections = 500
superuser_reserved_connections = 3

# ── Memory ──
shared_buffers = 4GB                   # 25% of total RAM (16GB server)
work_mem = 16MB                        # per-operation sort/hash memory
maintenance_work_mem = 512MB           # VACUUM, CREATE INDEX, etc.
effective_cache_size = 8GB             # OS + shared buffers cache hint
huge_pages = try                       # use OS huge pages if available

# ── WAL / Durability ──
wal_level = replica                    # supports streaming replication
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
wal_buffers = 64MB

# ── Query Planner ──
random_page_cost = 1.1                 # SSD storage
effective_io_concurrency = 200         # SSD
default_statistics_target = 200        # more accurate planner stats

# ── Autovacuum (tuned for high write workload) ──
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 2ms

# ── Logging ──
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 500       # log queries > 500ms
log_line_prefix = '%t [%p] %u@%d '
log_statement = 'ddl'                  # log DDL statements
log_temp_files = 0                     # log all temp files

# ── Connection Timeout ──
idle_in_transaction_session_timeout = 60000   # 60s — kill idle-in-txn
statement_timeout = 30000                      # 30s max query time

# ── SSL ──
ssl = on
ssl_cert_file = '/etc/ssl/certs/ssl-cert-snakeoil.pem'
ssl_key_file = '/etc/ssl/private/ssl-cert-snakeoil.key'
