# ═══════════════════════════════════════════════════════
# Coturn TURN/STUN Server — Ablox WebRTC NAT Traversal
# ═══════════════════════════════════════════════════════
# Enables WebRTC connections through restrictive NATs/firewalls.
# Used by LiveKit for media relay when direct P2P fails.

# ── Server Identity ──
realm=mrco.live
server-name=ablox-turn

# ── Listening Ports ──
listening-port=3478
tls-listening-port=5349

# ── Media Relay Ports ──
min-port=49152
max-port=49252

# ── Auth (use static-auth-secret for LiveKit HMAC) ──
use-auth-secret
static-auth-secret=${TURN_SECRET:-AbL0x_TURN_S3cr3t_2026!}

# ── Logging ──
log-file=stdout
verbose

# ── Performance ──
# Limit relay threads to avoid memory exhaustion
relay-threads=2
# 1Mbps max per session
max-bps=1048576
# Total quota 10Mbps
total-quota=10485760
# Max 500 allocations (= 500 WebRTC sessions)
user-quota=12
total-quota=0

# ── Security ──
# Restrict peer addresses (no loopback relay)
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# ── Protocol ──
fingerprint
lt-cred-mech
no-cli
no-tlsv1
no-tlsv1_1
