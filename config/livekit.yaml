# ═══════════════════════════════════════════════════════
# LiveKit Server Configuration — Ablox Live Streaming
# Minimal + proven config — no experimental fields
# TURN handled externally by Coturn (host network)
# ═══════════════════════════════════════════════════════

port: 7880

rtc:
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  tcp_port: 7881

keys:
  ablox_livekit_key: ablox_livekit_secret_2026_secure

room:
  empty_timeout: 300
  max_participants: 500

logging:
  level: info
  json: true
