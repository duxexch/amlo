# ═══════════════════════════════════════════════════════
# Ablox — Production Docker Compose
# Isolated network: ablox_network (no port conflicts)
# Only port 3000 exposed externally (app)
# DB/Redis communicate internally — no host ports needed
# ═══════════════════════════════════════════════════════

services:
  # ── Ablox Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ablox_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ablox_admin}:${POSTGRES_PASSWORD:-AbL0x_S3cur3_2026!}@postgres:5432/${POSTGRES_DB:-ablox}
      REDIS_URL: redis://:${REDIS_PASSWORD:-AbL0x_R3d1s_2026!}@redis:6379
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - ablox_logs:/app/logs
    networks:
      - ablox_network
      - proxy
    labels:
      # ── Traefik reverse proxy (Hostinger Docker Manager) ──
      - "traefik.enable=true"
      - "traefik.http.routers.ablox.rule=Host(`${DOMAIN:-mrco.live}`)"
      - "traefik.http.routers.ablox.entrypoints=websecure"
      - "traefik.http.routers.ablox.tls.certresolver=letsencrypt"
      - "traefik.http.services.ablox.loadbalancer.server.port=3000"
      # WebSocket support for Socket.io
      - "traefik.http.middlewares.ablox-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.ablox.middlewares=ablox-headers"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: ablox_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ablox}
      POSTGRES_USER: ${POSTGRES_USER:-ablox_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AbL0x_S3cur3_2026!}
    # No external port — internal only (avoids conflict with vex-db:5432, classitest-db:5433)
    volumes:
      - ablox_pgdata:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ablox_admin} -d ${POSTGRES_DB:-ablox}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis Cache & Sessions ──
  redis:
    image: redis:7-alpine
    container_name: ablox_redis
    restart: unless-stopped
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-AbL0x_R3d1s_2026!} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    # No external port — internal only (avoids conflict with other Redis instances)
    volumes:
      - ablox_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-AbL0x_R3d1s_2026!}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ablox_network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  ablox_network:
    name: ablox_network
    driver: bridge
  proxy:
    external: true
    name: proxy

volumes:
  ablox_pgdata:
    name: ablox_pgdata
    driver: local
  ablox_redisdata:
    name: ablox_redisdata
    driver: local
  ablox_logs:
    name: ablox_logs
    driver: local
