# ═══════════════════════════════════════════════════════════
# PgBouncer Configuration — Connection Pooling for Ablox
# Sits between the app and PostgreSQL to manage connections efficiently.
# ═══════════════════════════════════════════════════════════

[databases]
ablox = host=postgres port=5432 dbname=ablox

[pgbouncer]
# ── Pool Settings ──
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# ── Timeouts ──
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 300
query_timeout = 30
query_wait_timeout = 60

# ── Logging ──
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

# ── Connection ──
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# ── Admin ──
admin_users = ablox_admin
stats_users = ablox_admin
